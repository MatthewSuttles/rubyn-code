name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["4.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Debug spec loading
        run: bundle exec rspec --dry-run --format progress 2>&1 | tail -5
        continue-on-error: true
      - name: Run specs
        run: bundle exec rspec --format progress --warnings 2>&1 | tee /tmp/rspec.txt; grep "0 failures" /tmp/rspec.txt && grep "Line Coverage" /tmp/rspec.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
