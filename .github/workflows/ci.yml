name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["4.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run specs
        run: |
          set +e
          bundle exec rspec --format progress 2>&1 | tee /tmp/rspec.txt
          set -e
          # Check for actual test failures (not spec file load errors)
          grep -q "0 failures" /tmp/rspec.txt
          # Report coverage
          grep "Line Coverage" /tmp/rspec.txt || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
