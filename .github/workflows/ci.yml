name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["4.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Debug - test single spec file
        run: bundle exec rspec spec/rubyn_code/cli/app_spec.rb --format documentation 2>&1 || true
      - name: Debug - test config spec
        run: bundle exec rspec spec/rubyn_code/config/settings_spec.rb --format documentation 2>&1 || true
      - name: Debug - test context spec
        run: bundle exec rspec spec/rubyn_code/context/manager_spec.rb --format documentation 2>&1 || true
      - name: Run specs
        run: bundle exec rspec --format progress --order defined

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
